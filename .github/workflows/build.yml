name: Build and Upload to PyPI

on:
  push:
    tags:
      - '*'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Focando no Ubuntu para garantir estabilidade e evitar erros de rede do macOS
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # cp36-cp38: Versões antigas do CPython
          # pp*: Pula todas as versões do PyPy (evita erro de compilação do NumPy)
          CIBW_SKIP: cp36-* cp37-* cp38-* pp*
          
          # Dependência necessária para o comando de teste
          CIBW_TEST_REQUIRES: numpy
          
          # Validação final: garante que os símbolos C foram linkados e o pacote importa
          CIBW_TEST_COMMAND: python -c "import strkernels; print('Sucesso:', strkernels.__all__)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  publish:
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}